<!DOCTYPE html>
<html ng-app="calApp">
    <head>
        <title>Calculator</title>
        <script src="angular.min.js"></script>
        
    </head>
    <body ng-controller="calCtrl">
        Enter Numbber:<input type="number" ng-model="n">
        Factorial:{{factorial(n)}}<br>
        Square:{{n*n}}
        <script>
            angular.module("calApp",[])
            .controller("calCtrl", function($scope){
                $scope.factorial=function(n){
                    if(n==0||n==1) return 1;
                    let f=1;
                    for(let i=2; i<=n; i++) f*=i;
                    return f;
                }
            })
        </script>
    </body>
</html>
